when:
  - event: tag
    ref: "refs/tags/v*"

steps:
  - name: build
    image: ghcr.io/astral-sh/uv:latest
    commands:
      - uv build

  - name: publish
    image: ghcr.io/astral-sh/uv:latest
    commands:
      - uv publish --publish-url https://git.kropcloud.net/api/packages/${CI_REPO_OWNER}/pypi --username ${CI_REPO_OWNER} --password $FORGEJO_TOKEN
    environment:
      FORGEJO_TOKEN:
        from_secret: generic-release-token
